<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napoleon Bonaparte Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .question {
            margin-top: 25px;
            font-weight: bold;
            color: #34495e;
        }
        .options {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
        }
        label {
            padding: 10px;
            background: #ecf0f1;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        label:hover {
            background: #dbe2e3;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            font-size: 14px;
        }
        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #final-score {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Napoleon Quiz</h1>
    
    <div id="quiz-form">
        <!-- Vraag 1 -->
        <div class="question">1. Waar werd Napoleon Bonaparte geboren?</div>
        <div class="options">
            <label><input type="radio" name="q1" value="A"> Parijs</label>
            <label><input type="radio" name="q1" value="B"> Corsica</label>
            <label><input type="radio" name="q1" value="C"> Elba</label>
        </div>
        <div id="feedback-q1" class="feedback"></div>

        <!-- Vraag 2 -->
        <div class="question">2. Welke titel nam Napoleon aan in 1804?</div>
        <div class="options">
            <label><input type="radio" name="q2" value="A"> Keizer der Fransen</label>
            <label><input type="radio" name="q2" value="B"> Koning van Frankrijk</label>
            <label><input type="radio" name="q2" value="C"> President van de Republiek</label>
        </div>
        <div id="feedback-q2" class="feedback"></div>

        <!-- Vraag 3 -->
        <div class="question">3. Bij welke beroemde veldslag werd Napoleon definitief verslagen?</div>
        <div class="options">
            <label><input type="radio" name="q3" value="A"> De Slag bij Austerlitz</label>
            <label><input type="radio" name="q3" value="B"> De Slag bij Borodino</label>
            <label><input type="radio" name="q3" value="C"> De Slag bij Waterloo</label>
        </div>
        <div id="feedback-q3" class="feedback"></div>

        <!-- Vraag 4 -->
        <div class="question">4. Hoe heette het beroemde burgerlijk wetboek dat hij invoerde?</div>
        <div class="options">
            <label><input type="radio" name="q4" value="A"> Magna Carta</label>
            <label><input type="radio" name="q4" value="B"> Code Napoléon</label>
            <label><input type="radio" name="q4" value="C"> De Franse Grondwet</label>
        </div>
        <div id="feedback-q4" class="feedback"></div>

        <!-- Vraag 5 -->
        <div class="question">5. Op welk eiland stierf Napoleon in ballingschap?</div>
        <div class="options">
            <label><input type="radio" name="q5" value="A"> Sint-Helena</label>
            <label><input type="radio" name="q5" value="B"> Sicilië</label>
            <label><input type="radio" name="q5" value="C"> Madagaskar</label>
        </div>
        <div id="feedback-q5" class="feedback"></div>

        <button onclick="checkAnswers()">Controleer Antwoorden</button>
    </div>

    <div id="final-score"></div>
</div>

<script>
    function checkAnswers() {
        const answers = {
            q1: { correct: "B", info: "Correct! Hij werd geboren in Ajaccio op het eiland Corsica." },
            q2: { correct: "A", info: "Inderdaad! Hij kroonde zichzelf tot Keizer in de Notre-Dame." },
            q3: { correct: "C", info: "Klopt! In 1815 werd hij bij Waterloo verslagen door de Britten en Pruisen." },
            q4: { correct: "B", info: "Goed! De Code Napoléon vormt nog steeds de basis voor veel Europese rechtssystemen." },
            q5: { correct: "A", info: "Juist. Hij stierf daar in 1821, ver weg in de Atlantische Oceaan." }
        };

        let score = 0;

        for (let key in answers) {
            const selected = document.querySelector(`input[name="${key}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback-${key}`);
            
            feedbackDiv.style.display = "block";

            if (selected) {
                if (selected.value === answers[key].correct) {
                    feedbackDiv.className = "feedback correct";
                    feedbackDiv.innerHTML = "✅ " + answers[key].info;
                    score++;
                } else {
                    feedbackDiv.className = "feedback incorrect";
                    feedbackDiv.innerHTML = "❌ Helaas, dat is fout. Het juiste antwoord was " + answers[key].correct + ".";
                }
            } else {
                feedbackDiv.className = "feedback incorrect";
                feedbackDiv.innerHTML = "⚠️ Je hebt geen antwoord gekozen.";
            }
        }

        const scoreDiv = document.getElementById('final-score');
        scoreDiv.innerHTML = `Je score: ${score} van de 5`;
    }
</script>

</body>
</html>
